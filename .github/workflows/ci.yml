name: ci

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  build-and-smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            cmake \
            ninja-build \
            pkg-config \
            libzmq3-dev \
            libportaudio2 \
            portaudio19-dev \
            libglfw3-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install jq cmake ninja pkg-config zeromq portaudio glfw

      - name: Validate assets manifest
        run: ./scripts/validate_assets_manifest.sh

      - name: Fetch assets
        run: ./scripts/fetch_assets.sh

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake --preset vcpkg

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
